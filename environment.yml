# Full env modernization (TEST BRANCH: env-modernize-py312).
#
# The aggressive counterpart to the opencv-4.11-bump branch: moves Python
# 3.9 -> 3.12 in addition to OpenCV 4.5 -> 4.11. Python 3.9 reaches end-of-life
# in Oct 2025, so this is the genuinely long-lasting target.
#
# Why this is now possible: the ONLY Python-version-limiting dependency was the
# compiled `genicam` bindings (used by harvesters for the Dalsa camera), pinned
# at 1.4.0. genicam 1.5.x ships wheels up to CPython 3.13, so it no longer caps
# the Python version. The other camera SDKs don't care about the Python version:
# vmbpy (AVT) is pure Python (>=3.7) and pyDCAM (Hamamatsu) is a ctypes wrapper.
#
# Hand-written minimal env (only what neucams imports); conda solves the rest.
#
# Kept EXACT on purpose -- these match vendor runtimes installed on the machine,
# do not bump without also updating the corresponding runtime:
#   - vmbpy==1.1.1   -> Allied Vision Vimba X C runtime
#   - pyDCAM==0.0.1  -> Hamamatsu DCAM-API runtime
#
# HOW TO TEST: conda env create -f environment.yml -n neucams_py312 (fresh name
# keeps your working env), activate, and smoke-test AVT + Dalsa + Hamamatsu +
# webcam. The two things most likely to need attention are the Dalsa GenTL
# producer (.cti) and pyDCAM under Py3.12 -- both should be fine (GenTL is
# backward-compatible, pyDCAM is ctypes) but that is what this branch verifies.
# Roll back = check out main's environment.yml.
name: neucams_env
channels:
  - conda-forge
dependencies:
  - python=3.12
  - opencv=4.11
  - numpy                  # let conda pick a py3.12-compatible numpy
  - pyqt>=5.15,<6          # PyQt5 (the GUI targets it) -- stay off PyQt6
  - pyqtgraph              # promoted widget in view/UI_display_settings.ui
  - ffmpeg                 # backend for scikit-video's FFmpegWriter
  - tifffile               # TiffWriter
  - scikit-video           # FFMPEGWriter uses skvideo.io.FFmpegWriter
  - pip
  - pip:
    - genicam>=1.5,<1.6     # 1.5.x adds cp312/cp313 wheels -> unblocks the Python bump
    - harvesters==1.4.3     # latest; pure Python; requires genicam>=1.2
    - vmbpy==1.1.1          # match the installed Vimba X runtime (pure Python, py3.12 OK)
    - pyDCAM==0.0.1         # match the installed DCAM-API runtime (ctypes)
