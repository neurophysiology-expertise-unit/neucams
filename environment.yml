# Minimal, modernized neucams environment (TEST BRANCH: opencv-4.11-bump).
#
# Hand-written (NOT `conda env export`) so conda can solve compatible transitive
# versions instead of the 2020-era exact pins the old file carried -- those
# hard pins are why a one-line OpenCV bump would never solve.
#
# Headline change: OpenCV 4.5.0 -> 4.11 (latest stable 4.x). Directly relevant:
# 4.11 carries Windows MSMF/DShow VideoCapture backend fixes (the backend that
# was hanging/flaking on the webcam). neucams only uses core, long-stable cv2
# APIs (VideoCapture, VideoWriter, cvtColor, rotate, flip, CAP_PROP_*), so the
# code needs no changes.
#
# Only packages neucams actually imports are listed; unused leftovers from the
# exported env were dropped (pyserial, pyzmq, pandas, pyyaml, pillow, natsort).
#
# python is kept at 3.9 to stay compatible with the camera SDKs (vmbpy 1.1.1,
# harvesters 1.4.3, pyDCAM). If conda cannot solve opencv=4.11 against py39,
# THAT is the signal a Python bump (3.11/3.12) is the next step -- a bigger
# change gated on re-testing every camera driver.
#
# HOW TO TEST:  conda env create -f environment.yml   (into a fresh env name if
# you want to keep the current one), then smoke-test AVT + Dalsa + Hamamatsu +
# webcam before merging. Roll back = check out main's environment.yml.
name: neucams_env
channels:
  - conda-forge
dependencies:
  - python=3.9
  - opencv=4.11
  - numpy>=1.23,<2         # opencv 4.11 needs newer than the old 1.19.5; <2 avoids the numpy-2.0 break
  - pyqt>=5.15,<6          # PyQt5 (the GUI targets it) -- stay off PyQt6
  - pyqtgraph              # promoted widget in view/UI_display_settings.ui
  - ffmpeg                 # backend for scikit-video's FFmpegWriter
  - tifffile               # TiffWriter
  - scikit-video           # FFMPEGWriter uses skvideo.io.FFmpegWriter
  - pip
  - pip:
    # camera SDK bindings -- keep exact, these are the known-good versions
    - genicam==1.4.0
    - harvesters==1.4.3
    - vmbpy==1.1.1
    - pyDCAM==0.0.1
